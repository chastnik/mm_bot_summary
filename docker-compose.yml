version: '3.8'

services:
  summary-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mattermost-summary-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      WEB_API_TOKEN: ${WEB_API_TOKEN:?WEB_API_TOKEN is required}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis
    labels:
      - "com.docker.compose.project=mattermost-summary-bot"

  redis:
    image: redis:7-alpine
    container_name: summary-bot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bot-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: summary-bot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - bot-network
    depends_on:
      - summary-bot
    labels:
      - "com.docker.compose.project=mattermost-summary-bot"

volumes:
  redis-data:
    driver: local

networks:
  bot-network:
    driver: bridge 