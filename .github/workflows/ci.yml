name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate bash syntax
        run: |
          shopt -s globstar nullglob
          files=(scripts/**/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found in scripts/"
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "Checking syntax: $file"
            bash -n "$file"
          done

      - name: ShellCheck
        run: |
          shopt -s globstar nullglob
          files=(scripts/**/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found in scripts/"
            exit 1
          fi
          shellcheck "${files[@]}"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint (critical errors only)
        run: flake8 . --exclude=venv,.venv,__pycache__ --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate config import
        run: python -c "from config import Config; print('Config import OK')"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test*.py'